version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: monitoring_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    deploy:
      resources:
        limits:
          memory: 500M
    networks:
      - campushub_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.3
    container_name: monitoring_grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin_not_secure}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=monitor.campuhub.site
      - GF_SERVER_ROOT_URL=https://monitor.campuhub.site/
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - campushub_network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: monitoring_alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - campushub_network
    restart: unless-stopped

  loki:
    image: grafana/loki:2.8.2
    container_name: monitoring_loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 500M
    networks:
      - campushub_network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.8.2
    container_name: monitoring_promtail
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/app/logs
    command: -config.file=/etc/promtail/config.yml
    networks:
      - campushub_network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: monitoring_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - campushub_network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.1
    container_name: monitoring_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - campushub_network
    restart: unless-stopped

  # Exporters
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: monitoring_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
    networks:
      - campushub_network
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: monitoring_redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - campushub_network
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: monitoring_nginx_exporter
    command:
      - '-nginx.scrape-uri=http://nginx:80/nginx_status'
    networks:
      - campushub_network
    restart: unless-stopped

networks:
  campushub_network:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
