upstream django_app {
    server django-app:8000;
}

server {
    listen 80;
    server_name campuhub.site www.campuhub.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name campuhub.site www.campuhub.site;

    ssl_certificate /etc/letsencrypt/live/campuhub.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campuhub.site/privkey.pem;

    # Strong SSL Security (Best Practices)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Optimization: Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security: Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    
    client_max_body_size 100M;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        
        # Security: Trust proxy for HTTPS identification
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health/ {
        access_log off;
        return 200 "OK\n";
    }
}
