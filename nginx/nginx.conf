upstream django_app {
    server django-app:8000;
}

server {
    listen 80;
    server_name campuhub.site www.campuhub.site;
    return 301 https://$host$request_uri;














    
}

server {
    listen 443 ssl;
    server_name campuhub.site www.campuhub.site;

    ssl_certificate /etc/letsencrypt/live/campuhub.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campuhub.site/privkey.pem;

    # Strong SSL Security (Best Practices)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Optimization: Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security: Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    
    client_max_body_size 100M;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        
        # Security: Trust proxy for HTTPS identification
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx Status for Prometheus
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12; # Allow Docker bridge networks
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # Health check
    location /health/ {
        access_log off;
        return 200 "OK\n";
    }
}

    # Monitoring Sub-domain (Grafana)
server {
    listen 443 ssl;
    server_name monitor.campuhub.site;

    ssl_certificate /etc/letsencrypt/live/campuhub.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/campuhub.site/privkey.pem;

    # Fintech-Grade Security Headers
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Use resolver to allow Nginx to start even if monitoring is down
    resolver 127.0.0.11 valid=30s;
    set $grafana_upstream http://monitoring_grafana:3000;

    location / {
        proxy_pass $grafana_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
