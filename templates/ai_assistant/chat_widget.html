<div id="ai-chat-widget">
    <button id="ai-chat-button" title="Besoin d'aide ?">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" />
        </svg>
    </button>

    <div id="ai-chat-window">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%;"></div>
                <strong>Assistant CampusHub</strong>
            </div>
            <button id="close-chat" style="background: none; border: none; color: white; cursor: pointer;">✕</button>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message message-ia">
                Bonjour ! Je suis l'assistant intelligent de CampusHub. Comment puis-je vous aider aujourd'hui ?
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator" style="padding: 0 16px;">Assistant en train d'écrire...</div>

        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Posez votre question...">
            <button id="send-chat">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="/static/js/ai_chat.js"></script>
